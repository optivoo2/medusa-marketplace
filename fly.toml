# Fly.io configuration for PetRescue Brasil
app = "petrescue-brasil"
primary_region = "gru"  # São Paulo region

[build]

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  release_command = "npx medusa db:migrate"

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/public/"
